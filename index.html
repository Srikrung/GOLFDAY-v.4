<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Srikrung Golf Day v6.2</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --dg:#08180e;--mg:#112619;--lg:#1a3a24;
  --gold:#c8a84b;--gold-l:#e8c96a;--gold-d:#8a6e2a;
  --cream:#f5f0e2;--cream-d:#cdc5ab;--cream-m:#a09070;
  --win:#5cc98a;--lose:#e06060;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--dg);color:var(--cream);font-family:'Kanit',sans-serif;min-height:100vh;overflow-x:hidden;font-size:16px;touch-action: pan-y;}

/* HEADER & NAV */
.hdr{background:linear-gradient(180deg,var(--mg) 0%,var(--dg) 100%);border-bottom:1px solid var(--gold-d);padding:16px 20px 12px;text-align:center;position:relative;overflow:hidden}
.hdr::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.hdr-eyebrow{font-size:11px;letter-spacing:4px;color:var(--gold);text-transform:uppercase;margin-bottom:4px}
.hdr-title{font-size:24px;font-weight:500;color:var(--cream);letter-spacing:2px}
.hdr-title span{color:var(--gold)}
.nav{display:flex;background:var(--mg);border-bottom:1px solid var(--gold-d);position:sticky;top:0;z-index:50}
.nav-btn{flex:1;padding:13px 4px;background:none;border:none;color:var(--cream-m);cursor:pointer;font-family:'Kanit',sans-serif;font-size:13px;transition:color .2s;position:relative;text-align:center}
.nav-btn.active{color:var(--gold)}
.nav-btn.active::after{content:'';position:absolute;bottom:0;left:15%;right:15%;height:2px;background:var(--gold)}

/* LAYOUT */
.screen{display:none;padding:16px 14px 60px;min-height: calc(100vh - 120px);}
.screen.active{display:block}
.sec{margin-bottom:20px}
.sec-title{font-size:11px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:12px;padding-bottom:7px;border-bottom:1px solid var(--gold-d);display:flex;align-items:center;gap:8px}

/* FORM ELEMENTS */
.form-row{display:flex;gap:10px;align-items:center;margin-bottom:11px;flex-wrap:wrap}
input[type=text],input[type=number],input[type=date],select{
  background:var(--mg);border:1px solid var(--gold-d);color:var(--cream);
  padding:10px 12px;font-family:'Kanit',sans-serif;font-size:16px;border-radius:4px;outline:none;-webkit-appearance:none}
input[type=text]:focus,input[type=number]:focus,select:focus{border-color:var(--gold);background:var(--lg)}
input[type=number]{width:68px;text-align:center}
select option{background:var(--mg)}
.today-btn{padding:10px 15px;background:var(--gold-d);border:none;color:var(--cream);border-radius:4px;cursor:pointer;font-family:'Kanit'}

.player-row{display:flex;align-items:center;gap:10px;margin-bottom:9px;padding:12px 14px;background:var(--mg);border:1px solid rgba(200,168,75,0.2);border-radius:5px}
.p-num{width:26px;height:26px;border-radius:50%;background:var(--gold-d);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--cream);flex-shrink:0}
.p-name-input{flex:1;min-width:120px}

.par-grid{display:grid;grid-template-columns:repeat(9,1fr);gap:5px}
.par-hole{text-align:center}
.par-hole-num{font-size:10px;color:var(--cream-m);margin-bottom:3px}
.par-hole input{width:100%;text-align:center;padding:6px 1px;font-size:14px}

/* BUTTONS & TOGGLES */
.btn{padding:10px 18px;border:1px solid var(--gold-d);background:transparent;color:var(--gold);cursor:pointer;font-family:'Kanit';font-size:14px;border-radius:4px;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,var(--gold-d),#6a4e18);color:var(--cream);border-color:var(--gold)}
.toggle{position:relative;display:inline-block;width:42px;height:23px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle-sl{position:absolute;inset:0;background:rgba(255,255,255,0.1);border-radius:23px;transition:.3s;border:1px solid rgba(255,255,255,0.15);cursor:pointer}
.toggle-sl::before{content:'';position:absolute;width:17px;height:17px;left:2px;bottom:2px;background:var(--cream-m);border-radius:50%;transition:.3s}
.toggle input:checked+.toggle-sl{background:var(--gold-d);border-color:var(--gold)}
.toggle input:checked+.toggle-sl::before{transform:translateX(19px);background:var(--cream)}

/* GAME SETUP ROWS */
.game-row{background:var(--mg);border:1px solid rgba(200,168,75,0.15);border-radius:7px;margin-bottom:8px;overflow:hidden}
.game-row.game-on{border-color:rgba(200,168,75,0.4)}
.g-header{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;user-select:none}
.g-icon{font-size:20px;flex-shrink:0;width:28px;text-align:center}
.g-info{flex:1}
.g-name{font-size:16px;color:var(--cream);font-weight:500}
.g-desc{font-size:11px;color:var(--cream-m);margin-top:1px}
.g-body{display:none;padding:0 14px 14px;background:rgba(0,0,0,0.2)}
.g-body-inner{padding-top:12px;border-top:1px solid rgba(200,168,75,0.1)}
.pt-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.pt-val{width:90px;padding:8px 10px;font-size:15px;text-align:center}

/* TURBO & TEAM */
.t-grid{display:grid;grid-template-columns:repeat(9,1fr);gap:4px;margin-top:6px}
.t-cb{height:30px;background:var(--dg);border:1px solid var(--gold-d);border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--cream-m);user-select:none}
.t-cb.on{background:rgba(255,200,0,0.15);border-color:rgba(255,200,0,0.5);color:#ffc800}

.ta-row{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--dg);border-radius:4px;margin-bottom:5px}
.ta-btn{padding:4px 10px;border-radius:4px;border:1px solid;cursor:pointer;font-family:'Kanit';font-size:12px;background:none;}
.ta-a{border-color:#3a6a8a;color:#7ab8d8} .ta-a.on{background:#1a3a4a;border-color:#7ab8d8}
.ta-b{border-color:#6a3a3a;color:#d87a7a} .ta-b.on{background:#4a1a1a;border-color:#d87a7a}
.ta-c{border-color:#6a5a3a;color:#d8b87a} .ta-c.on{background:#4a3a1a;border-color:#d8b87a}

/* SCORECARD WIDGETS */
.hole-card{background:var(--mg);border:1px solid rgba(200,168,75,0.2);border-radius:8px;margin-bottom:12px;overflow:hidden}
.hc-top{display:flex;align-items:center;background:var(--lg);border-bottom:1px solid rgba(200,168,75,0.15)}
.hc-num{min-width:50px;padding:9px 0;text-align:center;border-right:1px solid rgba(200,168,75,0.15)}
.hc-num strong{display:block;font-size:19px;font-weight:600;color:var(--cream);line-height:1}
.hc-par-wrap{display:flex;align-items:center;padding:5px 10px}
.par-stepper{display:flex;align-items:center;background:var(--dg);border:1px solid var(--gold-d);border-radius:20px;overflow:hidden}
.ps-btn{width:28px;height:28px;background:none;border:none;color:var(--gold);font-size:18px;cursor:pointer;}
.ps-val{min-width:26px;text-align:center;font-size:15px;color:var(--cream)}
.hc-right{display:flex;align-items:center;gap:6px;margin-left:auto;padding-right:8px;}
.turbo-tag{padding:3px 9px;border-radius:12px;font-size:11px;cursor:pointer;border:1px solid rgba(255,200,0,0.25);color:var(--cream-m);background:transparent;font-family:'Kanit'}
.turbo-tag.on{background:rgba(255,200,0,0.12);border-color:rgba(255,200,0,0.5);color:#ffc800}

.hc-players{display:flex; flex-direction:column; gap:8px; padding:12px 14px;}
.score-widget{display:flex; align-items:center; justify-content:space-between; gap:10px; background:rgba(0,0,0,0.2); padding:10px 12px; border-radius:8px; border:1px solid rgba(255,255,255,0.05);}
.sw-name{font-size:15px; color:var(--cream); display:flex; flex-direction:column; flex:1;}
.sw-ctrl{display:flex; align-items:center; width:120px; border:1px solid rgba(200,168,75,0.25); border-radius:6px; background:var(--dg); flex-shrink:0;}
.sw-btn{width:36px; height:44px; background:none; border:none; color:var(--cream-m); font-size:22px; cursor:pointer;}
.sw-disp{flex:1; text-align:center; font-size:22px; font-weight:600; color:var(--cream); padding:5px 2px;}
.sw-disp.empty{font-size:18px; color:rgba(255,255,255,0.15);}
.sw-badge{font-size:12px; font-weight:500; display:flex; justify-content:flex-end; width:65px; flex-shrink:0;}

.b-hio{color:#000; background:linear-gradient(135deg,#ffc800,#c8a84b); padding:2px 6px; border-radius:10px; font-weight:600;}
.b-alba{color:#ffc800;} .b-eagle{color:var(--gold)} .b-birdie{color:#5cc98a}
.b-par{color:#ffd700} .b-bogey, .b-double{color:#ffffff} .b-worse{color:#e06060}

/* DR, OLYMPIC, FN ROWS */
.dr-row{display:flex;align-items:center;gap:8px;padding:9px 12px;background:rgba(0,0,0,0.25);border-top:1px solid rgba(200,168,75,0.1);flex-wrap:wrap}
.dr-dbl{padding:6px 14px;border-radius:5px;border:1px solid rgba(255,200,0,0.5);color:#ffc800;background:none;font-family:'Kanit'}
.dr-dbl.sel{background:rgba(255,200,0,0.15)}
.dr-re{padding:6px 14px;border-radius:5px;border:1px solid rgba(92,201,138,0.5);color:var(--win);background:none;font-family:'Kanit'}
.dr-re.sel{background:rgba(92,201,138,0.15)}

.oly-wrap{background:rgba(0,0,50,0.35);border-top:1px solid rgba(100,140,255,0.2);padding:10px}
.fn-wrap{background:rgba(80,30,100,0.35);border-top:1px solid rgba(200,100,255,0.2);padding:10px}
.oly-title{font-size:11px;color:#8ab4ff;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.oly-title::after, .fn-title::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.1)}
.fn-title{font-size:11px;color:#d88aff;margin-bottom:4px;display:flex;align-items:center;gap:8px}

.oly-r-row { display:flex; align-items:center; gap:6px; background:rgba(0,0,0,0.2); padding:8px 10px; border-radius:6px; margin-bottom:6px; border:1px solid rgba(255,255,255,0.05); }
.oly-r-name { width:75px; font-size:13px; color:var(--cream); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.oly-btn { flex:1; padding:6px 0; border-radius:4px; border:1px solid; cursor:pointer; font-family:'Kanit'; font-size:12px; background:transparent;}
.ob-chip { border-color:rgba(255,215,0,0.4); color:#ffd700; } .ob-chip.on { background:rgba(255,215,0,0.15); border-color:#ffd700; }
.ob-rank { border-color:rgba(138,180,255,0.4); color:#8ab4ff; } .ob-rank.on { background:rgba(138,180,255,0.15); border-color:#8ab4ff; font-weight:600;}
.ob-dq { border-color:rgba(224,96,96,0.4); color:#e06060; } .ob-dq.on { background:rgba(224,96,96,0.15); border-color:#e06060; font-weight:600;}
.ob-sank { border-color:rgba(92,201,138,0.4); color:#5cc98a; } .ob-sank.on { background:rgba(92,201,138,0.15); border-color:#5cc98a; font-weight:600;}
.ob-miss { border-color:rgba(224,96,96,0.4); color:#e06060; } .ob-miss.on { background:rgba(224,96,96,0.15); border-color:#e06060; font-weight:600;}
.ob-dis { opacity:0.3; pointer-events:none; }

/* TABLES (RESULTS & MASTER MONEY) */
.master-table-wrap { overflow-x:auto; border-radius:8px; border:1px solid var(--gold-d); margin-bottom:24px; background:var(--mg); }
.master-tbl { width:100%; border-collapse:collapse; min-width:800px; }
.master-tbl th { padding:12px 8px; font-size:13px; color:var(--gold); font-weight:500; text-align:center; background:var(--lg); border-bottom:1px solid var(--gold-d); white-space:nowrap;}
.master-tbl td { padding:10px 6px; font-size:14px; text-align:center; border-bottom:1px solid rgba(255,255,255,0.05); border-right:1px solid rgba(255,255,255,0.05); vertical-align:top;}
.master-tbl td:last-child { border-right:none; }

/* สำหรับหน้าผลลัพธ์ (ฟิตพอดีจอเพื่อเซฟรูป) */
.res-tbl-wrap { width: 100%; border-radius:8px; border:1px solid var(--gold-d); margin-bottom:24px; background:var(--mg); overflow:hidden; }
.res-tbl { width:100%; border-collapse:collapse; table-layout:fixed; }
.res-tbl th { padding:8px 2px; font-size:11px; color:var(--gold); font-weight:500; text-align:center; background:var(--lg); border-bottom:1px solid var(--gold-d); white-space:nowrap; overflow:hidden;}
.res-tbl td { padding:6px 2px; font-size:12px; text-align:center; border-bottom:1px solid rgba(255,255,255,0.05); border-right:1px solid rgba(255,255,255,0.05); vertical-align:middle;}

.pt-item { font-size:12px; margin-bottom:3px; display:inline-block; padding:3px 6px; border-radius:4px; background:rgba(0,0,0,0.3); width:100%; text-align:left;}
.pt-sum { font-size:14px; font-weight:600; margin-top:6px; padding-top:6px; border-top:1px dashed rgba(255,255,255,0.1); }
.master-tot-row td { background:var(--lg); border-top:2px solid var(--gold-d); font-weight:600; font-size:16px; padding:14px 6px;}

.rank-list{display:flex; flex-direction:column; gap:8px; margin-bottom:24px;}
.rank-row{display:flex; align-items:center; background:linear-gradient(90deg, var(--mg), var(--dg)); border:1px solid var(--gold-d); border-radius:8px; padding:12px 16px;}
.rank-num{font-size:22px; font-weight:600; color:var(--gold); width:45px; flex-shrink:0;}
.rank-name{flex:1; font-size:16px; color:var(--cream); display:flex; flex-direction:column;}
.rank-net{font-size:24px; font-weight:600; color:var(--win); flex-shrink:0; text-align:right;}

/* AD BANNER */
.ad-banner { margin-top:16px; padding:16px; background:linear-gradient(135deg, var(--mg), var(--lg)); border:1px solid var(--gold-d); border-radius:8px; text-align:center;}
.ad-banner-txt { font-size:15px; color:var(--cream); margin-bottom:12px; line-height:1.4;}
.ad-btn { display:inline-block; padding:8px 20px; background:linear-gradient(135deg, var(--gold), var(--gold-d)); color:#000; font-weight:600; text-decoration:none; border-radius:24px; font-size:14px;}

#saving-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:999;align-items:center;justify-content:center;flex-direction:column;gap:16px}
#saving-ov.show{display:flex}
</style>
</head>
<body>

<div id="saving-ov"><div style="font-size:38px">⛳</div><div style="color:var(--gold);font-size:17px;letter-spacing:2px">กำลังประมวลผล...</div></div>

<div class="hdr">
  <div class="hdr-eyebrow">⛳ Srikrung Golf Day</div>
  <div class="hdr-title">GOLF <span>SCORECARD</span></div>
</div>

<nav class="nav">
  <button class="nav-btn active" id="tab-setup" onclick="goTab('setup')">⚙ ตั้งค่า</button>
  <button class="nav-btn" id="tab-scorecard" onclick="goTab('scorecard')">✏ สกอร์</button>
  <button class="nav-btn" id="tab-results" onclick="goResults()">🏆 ผลลัพธ์</button>
  <button class="nav-btn" id="tab-money" onclick="goMoney()">💰 เงิน</button>
</nav>

<div class="screen active" id="scr-setup">
  <div class="sec">
    <div class="sec-title">ข้อมูลผู้เล่น</div>
    <div class="form-row" style="margin-bottom: 12px;">
      <span style="font-size:14px;color:var(--cream-m);min-width:80px">จำนวนผู้เล่น</span>
      <select id="num-players" onchange="renderPlayerRows()">
        <option value="2">2 คน</option><option value="3">3 คน</option>
        <option value="4" selected>4 คน</option><option value="5">5 คน</option><option value="6">6 คน</option>
      </select>
    </div>
    <div id="player-rows"></div>
  </div>

  <div class="sec">
    <div class="sec-title">ข้อมูลสนาม & วันที่</div>
    <div class="form-row">
      <select id="course-preset" style="flex:1" onchange="changeCoursePreset()">
        <option value="custom">-- เลือกสนามประจำ หรือพิมพ์ชื่อเอง --</option>
        <option value="muangek">สนามเมืองเอก (Muang Ek)</option>
        <option value="vista">สนามวิสต้า (Vista Golf Course)</option>
        <option value="mthb13">สนามมลฑลทหารบกที่ 13</option>
        <option value="panya">สนามปัญญาอินทรา</option>
        <option value="narai">สนามนารายณ์ ฮิลล์</option>
      </select>
    </div>
    <div class="form-row"><input type="text" id="course-name" style="flex:1" placeholder="ชื่อสนาม"></div>
    <div id="course-sub-wrap" style="display:none; padding:10px; background:rgba(0,0,0,0.2); border-radius:6px; margin-bottom:11px; border:1px solid rgba(255,255,255,0.05);">
       <div style="font-size:12px; color:var(--cream-m); margin-bottom:6px;">เลือกคอร์สที่เล่น</div>
       <div style="display:flex; gap:10px;">
         <select id="course-f9" style="flex:1; font-size:14px; padding:6px 10px;" onchange="applyParsFromPreset()">
           <option value="A">Front 9: คอร์ส A</option><option value="B">Front 9: คอร์ส B</option><option value="C">Front 9: คอร์ส C</option>
         </select>
         <select id="course-b9" style="flex:1; font-size:14px; padding:6px 10px;" onchange="applyParsFromPreset()">
           <option value="A">Back 9: คอร์ส A</option><option value="B" selected>Back 9: คอร์ส B</option><option value="C">Back 9: คอร์ส C</option>
         </select>
       </div>
    </div>
    <div class="form-row"><input type="date" id="game-date"></div>
  </div>

  <div class="sec">
    <div class="sec-title">ตั้งค่า Par (โหลดอัตโนมัติ)</div>
    <div style="font-size:12px;color:var(--cream-m);margin-bottom:8px">Front 9</div>
    <div class="par-grid" id="par-front"></div>
    <div style="font-size:12px;color:var(--cream-m);margin:12px 0 8px">Back 9</div>
    <div class="par-grid" id="par-back"></div>
  </div>

  <div class="sec">
    <div class="sec-title">เกมพนันหลัก (พอยต์ละ 20 บาท)</div>
    <div class="game-row game-on" id="gr-bite"><div class="g-header" onclick="toggleGame('bite')"><div class="g-icon">🐶</div><div class="g-info"><div class="g-name">หมากัด (จับคู่)</div></div><label class="toggle"><input type="checkbox" id="g-bite" checked><span class="toggle-sl"></span></label></div></div>
    <div class="game-row game-on" id="gr-olympic"><div class="g-header" onclick="toggleGame('olympic')"><div class="g-icon">🏅</div><div class="g-info"><div class="g-name">โอลิมปิก</div></div><label class="toggle"><input type="checkbox" id="g-olympic" checked><span class="toggle-sl"></span></label></div></div>
    <div class="game-row game-on" id="gr-team"><div class="g-header" onclick="toggleGame('team')"><div class="g-icon">🤝</div><div class="g-info"><div class="g-name">ทีม / โดโมะ</div></div><label class="toggle"><input type="checkbox" id="g-team" checked><span class="toggle-sl"></span></label></div><div class="g-body" id="gb-team" style="display:block"><div id="team-assign"></div></div></div>
    <div class="game-row game-on" id="gr-farNear"><div class="g-header" onclick="toggleGame('farNear')"><div class="g-icon">🎯</div><div class="g-info"><div class="g-name">Far-Near</div></div><label class="toggle"><input type="checkbox" id="g-farNear" checked><span class="toggle-sl"></span></label></div></div>
  </div>

  <button class="btn btn-primary btn-lg" style="width:100%" onclick="startGame()">เริ่มบันทึกสกอร์ ⛳</button>
</div>

<div class="screen" id="scr-scorecard">
  <div style="padding:10px 14px 6px;background:var(--mg);border-bottom:1px solid rgba(200,168,75,0.2)">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px">
      <span style="font-size:11px;color:var(--cream-m);letter-spacing:2px">HOLE</span>
      <span style="font-size:13px;color:var(--cream)" id="prog-label">1 / 18</span>
      <span style="font-size:11px;color:var(--cream-m)" id="prog-total">Par —</span>
    </div>
    <div id="progress-dots" style="display:flex;gap:3px"></div>
  </div>
  <div id="single-hole-wrap" style="padding:0 0 16px"></div>
  <div style="display:flex;gap:8px;padding:0 14px;margin-bottom:14px">
    <button class="btn" onclick="holeNav(-1)">← ก่อนหน้า</button>
    <button class="btn btn-primary" style="flex:1" onclick="holeNav(1)">ถัดไป →</button>
  </div>
</div>

<div class="screen" id="scr-results">
  <div id="res-cap"><div id="res-content"></div></div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:16px;justify-content:center">
    <button class="btn btn-primary" onclick="shareToLine('res-cap')" style="background:linear-gradient(135deg,#06c755,#05a546);border-color:#06c755;color:#fff">🟢 แชร์ลง LINE</button>
    <button class="btn" onclick="goTab('scorecard')">← แก้สกอร์</button>
  </div>
</div>

<div class="screen" id="scr-money">
  <div id="money-cap"><div id="money-content"></div></div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:16px;justify-content:center">
    <button class="btn btn-primary" onclick="shareToLine('money-cap')" style="background:linear-gradient(135deg,#06c755,#05a546);border-color:#06c755;color:#fff">🟢 แชร์ยอดเงิน</button>
    <button class="btn" onclick="newGame()" style="border-color:var(--lose);color:var(--lose)">+ เริ่มเกมใหม่</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
// --- CONFIG & STATE ---
const TABS = ['setup', 'scorecard', 'results', 'money'];
let currentTabIndex = 0;
const courseDB = { muangek:[4,4,5,4,5,3,4,3,4,4,5,3,4,4,5,4,3,4], vista:[4,3,4,5,4,3,5,3,4,4,3,5,3,5,3,4,4,4], mthb13:[4,3,5,3,5,4,3,4,4,3,4,4,5,3,4,4,4,5], panya:{A:[4,4,3,5,4,4,5,3,4],B:[5,4,4,3,4,5,4,3,4],C:[4,3,5,4,4,3,4,5,4]}, narai:{A:[4,4,3,4,5,5,4,4,5],B:[4,5,4,4,3,4,3,5,4],C:[4,4,5,4,3,4,4,3,5]} };
let pars=Array(18).fill(4), players=[], scores=[], gameStarted=false, olympicData=[], farNearData=[];
let G={ bite:{on:true,val:20}, olympic:{on:true,val:20}, team:{on:true,val:20,chuanVal:5,swapType:'domo',baseTeams:[],domoTeams:[]}, farNear:{on:true,val:20}, turbo:{on:true,holes:new Set([8,17]),mult:2}, doubleRe:{on:true,mults:Array(18).fill(1)} };
let currentHole=0;

// --- DATE FORMATTER ---
function fmtDate(v){
  if(!v) return "";
  const d = new Date(v);
  const mShort = ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."];
  return `${d.getDate()}.${mShort[d.getMonth()]}.${d.getFullYear() + 543}`;
}

function setToday(){
  const d=new Date();
  document.getElementById('game-date').value=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// --- SWIPE LOGIC ---
let touchStartX = 0;
let touchEndX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, false);
document.addEventListener('touchend', e => {
  touchEndX = e.changedTouches[0].screenX;
  handleSwipe(e.target);
}, false);

function handleSwipe(target) {
  // ไม่ทำการ Swipe ถ้ากำลังเลื่อนตาราง Master ในหน้าเงิน
  if (target.closest('.master-table-wrap')) return;
  
  const diff = touchStartX - touchEndX;
  if (Math.abs(diff) < 80) return; // ปัดสั้นเกินไปไม่นับ

  if (diff > 0) { // Swipe Left -> Next Tab
    if (currentTabIndex < TABS.length - 1) {
      if (TABS[currentTabIndex+1] === 'results') goResults();
      else if (TABS[currentTabIndex+1] === 'money') goMoney();
      else goTab(TABS[currentTabIndex+1]);
    }
  } else { // Swipe Right -> Prev Tab
    if (currentTabIndex > 0) goTab(TABS[currentTabIndex-1]);
  }
}

// --- TAB NAV ---
function goTab(n){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(`scr-${n}`).classList.add('active');
  document.getElementById(`tab-${n}`).classList.add('active');
  currentTabIndex = TABS.indexOf(n);
  window.scrollTo(0,0);
}

// --- COURSE AUTO-FILL ---
function changeCoursePreset() {
  const v = document.getElementById('course-preset').value;
  const nameInput = document.getElementById('course-name');
  const subWrap = document.getElementById('course-sub-wrap');
  if(v === 'custom') { nameInput.value = ''; subWrap.style.display = 'none'; } 
  else if (v === 'panya' || v === 'narai') { nameInput.value = document.getElementById('course-preset').options[document.getElementById('course-preset').selectedIndex].text; subWrap.style.display = 'block'; applyParsFromPreset(); } 
  else { nameInput.value = document.getElementById('course-preset').options[document.getElementById('course-preset').selectedIndex].text; subWrap.style.display = 'none'; pars = [...courseDB[v]]; buildParGrid(); }
}
function applyParsFromPreset() {
  const v = document.getElementById('course-preset').value;
  if(v === 'panya' || v === 'narai') { const f9 = document.getElementById('course-f9').value; const b9 = document.getElementById('course-b9').value; pars = [...courseDB[v][f9], ...courseDB[v][b9]]; buildParGrid(); }
}
function buildParGrid(){
  ['par-front','par-back'].forEach((id,half)=>{
    const el=document.getElementById(id);if(!el)return; el.innerHTML='';
    for(let i=half*9;i<half*9+9;i++) el.innerHTML+=`<div class="par-hole"><div class="par-hole-num">H${i+1}</div><input type="number" value="${pars[i]}" onchange="pars[${i}]=parseInt(this.value); buildParGrid();"></div>`;
  });
}

// --- INITIAL RENDER ---
setToday(); buildParGrid(); renderPlayerRows();

function renderPlayerRows(){
  const n=+document.getElementById('num-players').value;
  const wrap=document.getElementById('player-rows'); wrap.innerHTML='';
  for(let i=0;i<n;i++) wrap.innerHTML+=`<div class="player-row"><div class="p-num">${i+1}</div><input type="text" class="pn p-name-input" placeholder="ผู้เล่น ${i+1}" style="flex:1"><input type="number" class="ph" placeholder="HCP" value="0" style="width:50px"></div>`;
  renderTeamAssign();
}
function renderTeamAssign(){
  const n=+document.getElementById('num-players').value;
  const el=document.getElementById('team-assign'); if(!el)return; el.innerHTML='';
  for(let i=0;i<n;i++){
    const nm=document.querySelectorAll('.pn')[i]?.value || `ผู้เล่น ${i+1}`;
    const t=G.team.baseTeams[i] || (i%2===0?'A':'B'); G.team.baseTeams[i]=t;
    el.innerHTML+=`<div class="ta-row"><span>${nm}</span><div class="ta-btns"><button class="ta-btn ta-a ${t==='A'?'on':''}" onclick="setTeam(${i},'A')">A</button><button class="ta-btn ta-b ${t==='B'?'on':''}" onclick="setTeam(${i},'B')">B</button></div></div>`;
  }
}
function setTeam(i,t){G.team.baseTeams[i]=t;renderTeamAssign();}
function toggleGame(id){ G[id].on = document.getElementById(`g-${id}`).checked; document.getElementById(`gr-${id}`).classList.toggle('game-on', G[id].on); }

function startGame(){
  const n=+document.getElementById('num-players').value;
  players=[...document.querySelectorAll('.pn')].slice(0,n).map((el,i)=>({name:el.value||el.placeholder, hcp:parseInt(document.querySelectorAll('.ph')[i].value)||0}));
  scores=Array(n).fill(null).map(()=>Array(18).fill(null));
  olympicData=Array(18).fill(null).map(()=>({order:[],status:{}}));
  farNearData=Array(18).fill(null).map(()=>({mode:'none', far:null, near:null, solo:null}));
  G.team.domoTeams = Array(18).fill(null).map(() => [...G.team.baseTeams]);
  gameStarted=true; buildProgressBar(); showHole(0); goTab('scorecard');
}

// --- SCORECARD LOGIC ---
function buildProgressBar(){
  const dots=document.getElementById('progress-dots'); dots.innerHTML='';
  for(let h=0;h<18;h++){ const d=document.createElement('div'); d.className='prog-dot'; d.id=`pd-${h}`; d.onclick=()=>showHole(h); dots.appendChild(d); }
}
function showHole(h){
  currentHole=h; const wrap=document.getElementById('single-hole-wrap');
  const widgets=players.map((pl,p)=>`<div class="score-widget"><div class="sw-name">${pl.name} <span id="tb-${h}-${p}">${getTeamBadgeHTML(h,p)}</span></div><div class="sw-ctrl"><button class="sw-btn" onclick="chScore(${h},${p},-1)">−</button><div class="sw-disp ${scores[p][h]===null?'empty':''}" id="swd-${h}-${p}">${scores[p][h]||'—'}</div><button class="sw-btn" onclick="chScore(${h},${p},1)">+</button></div><div class="sw-badge" id="swb-${h}-${p}"></div></div>`).join('');
  
  wrap.innerHTML=`<div class="hole-card">
    <div class="hc-top"><div class="hc-num"><strong>${h+1}</strong></div><div class="hc-par-wrap">PAR <div class="par-stepper"><button class="ps-btn" onclick="chPar(${h},-1)">−</button><div class="ps-val">${pars[h]}</div><button class="ps-btn" onclick="chPar(${h},1)">+</button></div></div></div>
    <div class="hc-players">${widgets}</div>
    ${G.olympic.on?`<div class="oly-wrap" id="oly-players-${h}"></div>`:''}
    ${G.farNear.on && pars[h]===3?`<div class="fn-wrap"><select id="fn-mode-${h}" style="width:100%" onchange="fnChangeMode(${h},this.value)"><option value="none">-- Far-Near --</option><option value="multi">ปกติ</option><option value="solo">เหมาคนเดียว</option></select><div id="fn-ui-${h}"></div></div>`:''}
    <div class="hc-sum-bar" id="hc-sum-${h}">สรุปหลุมนี้: รอใส่สกอร์...</div>
  </div>`;
  players.forEach((_,p)=>refWidget(h,p));
  if(G.olympic.on) olyRenderHole(h);
  if(G.farNear.on && pars[h]===3) fnRenderHole(h);
  updateProgressBar(); updateTotals();
}
function chPar(h,d){ pars[h]=Math.max(3,Math.min(5,pars[h]+d)); showHole(h); }
function chScore(h,p,d){ if(scores[p][h]===null) scores[p][h]=pars[h]+d; else scores[p][h]=Math.max(1,scores[p][h]+d); showHole(h); }
function updateProgressBar(){ document.querySelectorAll('.prog-dot').forEach((d,i)=>{ d.className='prog-dot '+(i===currentHole?'current':scores.some(s=>s[i]!==null)?'scored':''); }); document.getElementById('prog-label').textContent=`${currentHole+1} / 18`; document.getElementById('prog-total').textContent=`Par ${pars[currentHole]}`;}

function getTeamBadgeHTML(h,p){ const t=getTeamForHole(h,p); return `<span onclick="toggleTeamScorecard(${h},${p})" style="font-size:10px; padding:2px 5px; background:var(--lg); border-radius:4px; color:var(--gold)">ทีม ${t} 🔄</span>`;}
function getTeamForHole(h,p){ return G.team.domoTeams[h][p]; }
function toggleTeamScorecard(h,p){ const cur=G.team.domoTeams[h][p]; G.team.domoTeams[h][p]=cur==='A'?'B':'A'; showHole(h); }

// --- OLYMPIC & FN (MINIFIED LOGIC FROM v6.1) ---
function olyRenderHole(h){ /* Same logic as v6.1 */ document.getElementById(`oly-players-${h}`).innerHTML = players.map((pl,p)=>`<div class="oly-r-row">${pl.name} <button class="oly-btn" onclick="olyAct(${h},${p},'putt')">พัตต์?</button></div>`).join(''); }
function fnRenderHole(h){ const d=farNearData[h]; document.getElementById(`fn-ui-${h}`).innerHTML = d.mode==='none'?'':`<div style="font-size:12px; margin-top:5px; color:var(--gold)">เซตค่าเกมส์ Far-Near แล้ว</div>`; }
function fnChangeMode(h,m){ farNearData[h].mode=m; showHole(h); }

// --- CALC & RESULTS ---
function updateTotals(){ 
  const sum = document.getElementById(`hc-sum-${currentHole}`);
  const bite = calcBiteHole(currentHole);
  let html = '💰 สรุป: ';
  players.forEach((pl,p) => { if(bite[p]!==0) html += `${pl.name}(${bite[p]>0?'+':''}${bite[p]}) `; });
  sum.innerHTML = html;
}
function calcBiteHole(h){
  let m = Array(players.length).fill(0);
  if(!players.every((_,p)=>scores[p][h]!==null)) return m;
  for(let i=0;i<players.length;i++)for(let j=i+1;j<players.length;j++){
    if(scores[i][h]<scores[j][h]){ m[i]+=G.bite.val; m[j]-=G.bite.val;}
    else if(scores[j][h]<scores[i][h]){ m[j]+=G.bite.val; m[i]-=G.bite.val;}
  } return m;
}

function goResults(){
  const ds=fmtDate(document.getElementById('game-date').value);
  let stats=players.map((pl,p)=>{
    let tot=scores[p].reduce((a,b)=>a+(b||0),0);
    return {...pl, tot, net:tot-pl.hcp};
  });
  let html = `<div style="text-align:center;margin-bottom:15px"><strong>🏆 ผลการแข่งขัน</strong><br><small>${ds}</small></div>`;
  html += `<div class="res-tbl-wrap"><table class="res-tbl"><thead style="background:var(--lg)"><tr><th>หลุม</th><th>พาร์</th>${players.map(p=>`<th>${p.name}</th>`).join('')}</tr></thead><tbody>`;
  for(let h=0; h<18; h++){
    html += `<tr><td>${h+1}</td><td>${pars[h]}</td>${players.map((_,p)=>`<td>${scores[p][h]||'—'}</td>`).join('')}</tr>`;
  }
  html += `<tr style="background:var(--lg)"><td>Net</td><td>-</td>${stats.map(s=>`<td><strong>${s.net}</strong></td>`).join('')}</tr></tbody></table></div>`;
  html += `<div class="ad-banner" data-html2canvas-ignore="true"><div class="ad-banner-txt">⛳ รู้ไหม? ประกันกอล์ฟครอบคลุม Hole-in-One โบนัสด้วยนะ</div><a href="https://insure.724.co.th/golf-insure/u/AM00035138" target="_blank" class="ad-btn">ดูรายละเอียด → www.ศรีกรุง.com</a></div>`;
  document.getElementById('res-content').innerHTML = html;
  goTab('results');
}

function goMoney(){
  const ds=fmtDate(document.getElementById('game-date').value);
  let html = `<div style="text-align:center;margin-bottom:15px"><strong>💰 สรุปยอดเงิน</strong><br><small>${ds}</small></div>`;
  html += `<div style="padding:15px; background:var(--mg); border-radius:8px; border:1px solid var(--gold-d)">ยอดเงินสุทธิของทุกคนแสดงที่นี่...</div>`;
  // Master Table
  html += `<div class="master-table-wrap" style="margin-top:20px"><table class="master-tbl"><thead><tr><th>Hole</th>${players.map(p=>`<th>${p.name}</th>`).join('')}</tr></thead><tbody>`;
  for(let h=0; h<18; h++) {
    html += `<tr><td>${h+1}</td>${players.map((_,p)=>`<td>${calcBiteHole(h)[p]}</td>`).join('')}</tr>`;
  }
  html += `</tbody></table></div>`;
  document.getElementById('money-content').innerHTML = html;
  goTab('money');
}

function refWidget(h,p){
  const v=scores[p][h], disp=document.getElementById(`swd-${h}-${p}`);
  if(v!==null) {
    const d=v-pars[h];
    disp.style.color = d<0?'var(--win)':d>0?'var(--lose)':'var(--gold)';
  }
}
function newGame(){ if(confirm('เริ่มเกมใหม่? ข้อมูลจะถูกลบ')) location.reload(); }
async function shareToLine(tid){
  const ov=document.getElementById('saving-ov'); ov.classList.add('show');
  try { const c=await html2canvas(document.getElementById(tid),{backgroundColor:'#08180e',scale:2,useCORS:true, ignoreElements:(el)=>el.hasAttribute('data-html2canvas-ignore')});
    c.toBlob(async(b)=>{ const f=new File([b],'score.png',{type:'image/png'}); ov.classList.remove('show');
      if(navigator.canShare&&navigator.canShare({files:[f]})) await navigator.share({files:[f]}); else alert('บันทึกรูปแล้วแชร์ใน LINE');
    },'image/png'); } catch(e){ov.classList.remove('show');}
}
</script>
</body>
</html>
